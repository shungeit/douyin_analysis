version: '3.8'

services:
  db:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/mysql:8.0
    container_name: dy_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: dy_django_analysis
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_0900_ai_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: dy_web
    restart: always
    # 8000 端口仍暴露，方便直接访问 Django Admin
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: dy_django_analysis
      DB_USER: root
      DB_PASSWORD: 123456
      ALLOWED_HOSTS: "*"
      # Vite 开发服务器跨域许可（生产由 Nginx 代理，无需此项）
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      # QIANFAN_API_KEY: your_api_key_here
      # QIANFAN_APPID: your_appid_here
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: dy_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  mysql_data:
